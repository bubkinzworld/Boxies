<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Mario</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="hud">
      <div class="hud__group">
        <span class="hud__label">Health</span>
        <span id="healthValue">100</span>
      </div>
      <div class="hud__group">
        <span class="hud__label">Score</span>
        <span id="scoreValue">0</span>
      </div>
      <div class="hud__group">
        <span class="hud__label">Items Left</span>
        <span id="itemsValue">0</span>
      </div>
      <div class="hud__group">
        <span class="hud__label">Level</span>
        <span id="levelValue">1</span>
      </div>
    </header>

    <section class="instructions">
      Move with <kbd>Arrow Keys</kbd> or <kbd>WASD</kbd>. Collect green boxes, stomp red boxes from above,
      and touch the golden box to turn enemies into collectible movers for 5 seconds.
      Press <kbd>R</kbd> to restart.
    </section>

    <div class="arena-wrap">
      <div id="game" class="game" aria-label="Box Mario game area"></div>
      <div id="message" class="message hidden" aria-live="polite"></div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
